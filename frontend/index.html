<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동물 분류</title>
<style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 40px auto;
      max-width: 400px;
      padding: 0 20px;
      background: #f9f9f9;
      color: #333;
      text-align: center;
      line-height: 1.6;
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
      font-weight: 700;
    }
    
    input[type="file"] {
      margin-bottom: 20px;
    }
    
    img#preview {
      max-width: 100%;
      height: auto;
      display: none;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    button#btn {
      background-color: #3498db;
      border: none;
      padding: 12px 30px;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    button#btn:hover {
      background-color: #2980b9;
    }
    
    #result {
      margin-top: 30px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      white-space: pre-line;
      font-weight: 600;
      font-size: 17px;
    }
    </style>
</head>
<body>

<h1>동물 분류 & 돼지 품종</h1>

<input type="file" id="fileInput"><br><br>
<img id="preview"><br><br>
<button id="btn">분석하기</button>

<div id="result"></div>

<script>
var file;

document.getElementById('fileInput').onchange = function(e){
    var f = e.target.files[0];
    if(!f) return;
    if(f.type.indexOf('image') === -1){
        alert('클릭하여 업로드');
        return;
    }
    file = f;
    var r = new FileReader();
    r.onload = function(ev){
        var img = document.getElementById('preview');
        img.src = ev.target.result;
        img.style.display = 'block';
    };
    r.readAsDataURL(f);
};

document.getElementById('btn').onclick = function(){
    if(!file){
        alert('파일을 먼저 선택하세요');
        return;
    }
    document.getElementById('result').innerHTML = '분석중...';
    var fd = new FormData();
    fd.append('file', file);
    fetch('http://192.168.123.21:8000/predict', {
        method: 'POST',
        body: fd
    }).then(function(r){ return r.json(); })
    .then(function(d){
        var t = '동물: ' + d.animal + ' (' + (d.confidence*100).toFixed(1) + '%)';
        if(d.breed){
            t += '\n품종: ' + d.breed + ' (' + (d.breed_confidence*100).toFixed(1) + '%)';
        }
        document.getElementById('result').innerHTML = t;
    })
    .catch(function(e){
        document.getElementById('result').innerHTML = '에러: ' + e;
    });
};
</script>

</body>
</html>
